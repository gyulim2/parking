<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>이경규의 파킹랏</title>
  <style>
    body {
      margin: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 56px 72px;
      text-align: center;
    }
    h1 { margin: 0 0 6px; font-size: 2em; color: #111; }
    p  { margin: 0 0 40px; color: #666; font-size: 0.95em; }
    .btns { display: flex; gap: 16px; justify-content: center; }
    a.btn {
      display: inline-block;
      padding: 14px 44px;
      border-radius: 6px;
      font-size: 1.05em;
      font-weight: 600;
      text-decoration: none;
    }
    .btn-user  { background: #2563eb; color: #fff; }
    .btn-admin { background: #374151; color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>이경규의 파킹랏</h1>
    <p>백화점 · 아파트 통합 주차 관리 시스템</p>
    <div class="btns">
      <a class="btn btn-user"  href="user/enter.html">사용자</a>
      <a class="btn btn-admin" href="admin/login.html">관리자</a>
    </div>
  </div>
</body>
</html>
